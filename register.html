<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Register" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#8B5CF6" />
  <meta name="author" content="NumeroSoul" />

  <!-- Open Graph -->
  <meta property="og:title" content="Register - NumeroSoul" />
  <meta property="og:description" content="Register" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://numerosoul.com/register.html" />
  <meta property="og:image" content="assets/images/logo.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Register - NumeroSoul" />
  <meta name="twitter:description" content="Register" />

  <title>Register - NumeroSoul</title>
  <link rel="canonical" href="https://numerosoul.com/register.html" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="alternate icon" href="assets/images/favicon.ico" />

  <!-- Resource Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="image" href="assets/images/logo.svg" type="image/svg+xml" />
  <link rel="preload" as="style" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;450;480;500;510;520;540;560;580&display=swap"
    rel="stylesheet" />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/dark-mode.css" />
  <link rel="stylesheet" href="assets/css/rtl.css" />


  <!-- Inline theme pre-apply -->
  <script>
    (function () {
      const t = localStorage.getItem('ns-theme');
      const r = localStorage.getItem('ns-rtl');
      if (t) document.documentElement.setAttribute('data-theme', t);
      if (r === 'true') document.documentElement.setAttribute('dir', 'rtl');
    })();
  </script>
</head>

<body>
  <main role="main">

    <div class="auth-page-wrapper">
      <div class="auth-toggles d-flex gap-2">
        <button class="nav-toggle-btn" data-theme-toggle><i class="bi bi-moon-stars"></i></button>
        <button class="nav-toggle-btn" data-rtl-toggle>RTL</button>
      </div>
      <div class="card-custom" style="max-width:450px;width:100%;">
        <div class="text-center mb-4">
          <a href="index.html"><img src="assets/images/logo.svg" alt="NumeroSoul Logo" width="180" height="50"
              class="mx-auto d-block mb-3"></a>
          <h4>Create Account</h4>
          <p class="text-muted small">Join us today to get started with your journey.</p>
        </div>
        <form class="needs-validation" novalidate>
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Full Name" required>
            <div class="invalid-feedback">Full name is required.</div>
          </div>
          <div class="mb-3">
            <input type="email" class="form-control" placeholder="Email Address" required>
            <div class="invalid-feedback">Valid email required.</div>
          </div>
          <div class="mb-3 position-relative">
            <input type="password" class="form-control password-input" id="regPassword" placeholder="Password" required>
            <button type="button" class="btn position-absolute end-0 top-0 h-100 px-3 password-toggle"
              onclick="const p=document.getElementById('regPassword');p.type=p.type==='password'?'text':'password';"><i class="bi bi-eye"></i></button>
            <div class="invalid-feedback">Password required.</div>
          </div>
          <div class="mb-3 position-relative">
            <input type="password" class="form-control password-input" id="regConfirmPassword"
              placeholder="Confirm Password" required>
            <button type="button" class="btn position-absolute end-0 top-0 h-100 px-3 password-toggle"
              onclick="const p=document.getElementById('regConfirmPassword');p.type=p.type==='password'?'text':'password';"><i class="bi bi-eye"></i></button>
            <div class="invalid-feedback">Please confirm your password.</div>
          </div>
          <div class="mb-3 form-check text-start">
            <input type="checkbox" class="form-check-input" id="termsCheck" required>
            <label class="form-check-label" for="termsCheck" style="font-size:0.9rem;">I agree to the <a href="#">Terms
                & Conditions</a></label>
            <div class="invalid-feedback">You must agree before submitting.</div>
          </div>
          <button type="submit" class="btn-primary-custom w-100 mb-3 mt-2">Register</button>
        </form>

        <div class="text-center mb-3 text-muted">or continue with</div>
        <div class="d-flex gap-2 mb-4">
          <button class="btn btn-outline-secondary w-50 d-flex align-items-center justify-content-center gap-2"><i
              class="bi bi-google"></i> Google</button>
          <button class="btn btn-outline-secondary w-50 d-flex align-items-center justify-content-center gap-2"><i
              class="bi bi-apple"></i> Apple</button>
        </div>

        <div class="text-center">
          <a href="login.html" class="text-decoration-none">Already have an account? Login</a>
        </div>
      </div>
    </div>

  </main>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"
    defer></script>
  <!-- Custom JS (ES6 module, deferred) -->
  <script src="assets/js/main.js" type="module" defer></script>
</body>

</html>
